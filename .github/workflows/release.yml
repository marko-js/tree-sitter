name: Release

# Changesets-driven release for @marko/tree-sitter.
#
# Every push to main runs the `release` job (changesets/action):
#   - if .changeset/*.md files are pending, it opens/updates a "[ci] release"
#     PR that runs `npm run version` (bumps package.json + tree-sitter.json,
#     writes CHANGELOG.md, consumes the changesets);
#   - when that PR is merged (no changesets left), it runs the publish command
#     `npm run release:tag`, which tags the release and sets the action's
#     `published` output to true.
#
# The prebuild/wasm/publish jobs are gated on `published`, so they only run on
# an actual release. They build the native prebuilds for every supported
# platform plus the wasm build and then publish, so consumers never need a C
# toolchain.
#
# Publishing uses npm trusted publishing (OIDC) — no NPM_TOKEN. Configure the
# trusted publisher for @marko/tree-sitter at npmjs.com (package Settings ->
# "Trusted Publisher") to point at this repo and this workflow file
# (release.yml). The "[ci] release" PR also requires "Allow GitHub Actions to
# create and approve pull requests" under Settings -> Actions -> General.
on:
  push:
    branches: [main]

permissions:
  contents: write # changesets opens the version PR and pushes the tag
  pull-requests: write # changesets opens the version PR
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release:tag
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prebuild:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # native runners for each published prebuild target. Windows is pinned
        # to 2022 (node-gyp can't detect VS2026 on windows-latest yet); the
        # macOS runner is arm64 and also cross-builds the Intel (x64) prebuild
        # below, so no Intel runner is needed.
        os:
          [
            ubuntu-latest,
            ubuntu-24.04-arm,
            macos-latest,
            windows-2022,
          ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Skip the package's node-gyp-build install script — prebuildify does the
      # real build, so the install-time compile is redundant.
      - run: npm install --ignore-scripts
      - run: npm run prebuild
      # macOS runners are arm64; cross-build the Intel (x64) prebuild too so we
      # don't need an Intel runner (N-API addons cross-compile cleanly).
      - if: runner.os == 'macOS'
        run: npm run prebuild -- --arch x64
      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.os }}
          # upload the platform subdirs under prebuilds/ (no leading prebuilds/)
          path: prebuilds/**

  wasm:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # tree-sitter-cli downloads the wasi-sdk toolchain automatically.
      - run: npm install
      - run: npm run build:wasm
      - run: npm run test:wasm
      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: tree-sitter-marko.wasm

  publish:
    needs: [release, prebuild, wasm]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - run: npm install -g npm@latest
      - run: npm install
      # Refresh generated sources (src/parser.c etc.) so the published tree
      # matches grammar.js exactly.
      - run: npm run generate
      # Gather every platform's prebuild back into prebuilds/ and the wasm
      # build to the package root, matching package.json "files".
      - uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          path: prebuilds
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: wasm
      - name: Show staged publish artifacts
        run: |
          ls -R prebuilds
          ls -la tree-sitter-marko.wasm
      # `changeset publish` only publishes versions not already on the registry,
      # so this is a no-op unless the version actually changed. Authenticated via
      # npm trusted publishing (OIDC); provenance is enabled via the env var. No
      # token required.
      - run: npm run release:publish
        env:
          NPM_CONFIG_PROVENANCE: "true"

  # Tell the Zed extension (marko-js/zed) to refresh its pinned grammar as soon
  # as a new version is published, so it always ships the latest grammar. The
  # zed repo also self-updates on a daily schedule, so this dispatch only makes
  # the update near-instant and is safe to skip when the token isn't configured.
  notify-zed:
    needs: [release, publish]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve released commit
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name)"
          sha="$(gh api "repos/${{ github.repository }}/commits/${tag}" --jq .sha)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
      - name: Dispatch grammar update to marko-js/zed
        # ZED_DISPATCH_TOKEN is a fine-grained PAT (or GitHub App token) with
        # `contents: write` on marko-js/zed; the default GITHUB_TOKEN cannot
        # dispatch across repositories. When the secret is absent the step is a
        # no-op so releases never fail because of it.
        env:
          GH_TOKEN: ${{ secrets.ZED_DISPATCH_TOKEN }}
          TAG: ${{ steps.rel.outputs.tag }}
          SHA: ${{ steps.rel.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ZED_DISPATCH_TOKEN not set; skipping (marko-js/zed self-updates on schedule)."
            exit 0
          fi
          gh api repos/marko-js/zed/dispatches \
            -f event_type=tree-sitter-released \
            -F "client_payload[tag]=${TAG}" \
            -F "client_payload[sha]=${SHA}"
