name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      # Fixtures are fetched from marko-js/htmljs-parser with degit; the
      # parser the tests compare against is the published htmljs-parser.
      - run: npm test

  prebuild:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # native runners for each published prebuild target. Windows is pinned
        # to 2022: node-gyp can't yet detect Visual Studio 2026 on the newer
        # windows-latest image.
        os:
          [
            ubuntu-latest,
            ubuntu-24.04-arm,
            macos-13,
            macos-latest,
            windows-2022,
          ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Skip the package's node-gyp-build install script — prebuildify does the
      # real build, so the install-time compile is redundant.
      - run: npm install --ignore-scripts
      - run: npm run prebuild
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.os }}
          path: prebuilds/**

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # tree-sitter-cli downloads the wasi-sdk toolchain automatically.
      - run: npm install
      - run: npm run build:wasm
      - run: npm run test:wasm
      - uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-marko-wasm
          path: tree-sitter-marko.wasm
